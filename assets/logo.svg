<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="18" fill="#1e293b"/>

  <!-- Anvil face + horn.
       Face: x=26–78, right side has a rounded corner.
       Horn tip at (6,27); top edge is a straight line up to the face;
       bottom edge is a quadratic bezier that sweeps left then curves up to the tip. -->
  <path fill="#e2e8f0" d="
    M 6,27
    L 26,12 L 78,12
    Q 84,12 84,20 L 84,38
    Q 84,44 78,44 L 26,44
    Q 14,44 6,27 Z
  "/>

  <!-- Waist (hourglass) + base.
       Shoulder: waist top is x=28–72, narrower than the face (x=26–78).
       Cubic S-curves pull the sides inward to ~x=36–64 at mid-waist
       then sweep dramatically outward to the base.
       Base: rounded rect x=14–86. -->
  <path fill="#e2e8f0" d="
    M 28,44 L 72,44
    C 70,50 62,56 78,66
    L 82,66 Q 86,66 86,72 L 86,84
    Q 86,88 82,88 L 18,88
    Q 14,88 14,84 L 14,72
    Q 14,66 18,66 L 22,66
    C 38,56 30,50 28,44 Z
  "/>
</svg>
